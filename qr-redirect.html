<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台风风廓线模型参数查询系统 - 二维码跳转</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #1a237e;
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .qr-code {
            margin: 30px 0;
            display: flex;
            justify-content: center;
        }
        
        .qr-canvas {
            border: 10px solid white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .button {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.5);
        }
        
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #3498db;
        }
        
        .info p {
            margin: 5px 0;
            color: #555;
        }
        
        .visitor-count {
            background: #e8f5e8;
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #4caf50;
            margin: 20px auto;
            display: inline-block;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .redirecting {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff9800;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 台风风廓线模型参数查询系统</h1>
            <p>扫描二维码或点击下方按钮直接访问系统</p>
        </div>
        
        <div class="qr-code">
            <canvas id="qrCanvas" class="qr-canvas" width="200" height="200"></canvas>
        </div>
        
        <div class="visitor-count" id="visitorCount">
            系统总访问次数: <span id="countDisplay">加载中...</span>
        </div>
        
        <div class="redirecting">
            <p>扫描二维码后将在 <span id="countdown">3</span> 秒后自动跳转...</p>
        </div>
        
        <a href="index.html" class="button" onclick="recordVisit()">
            📱 立即访问系统
        </a>
        
        <div class="info">
            <p><strong>网址信息：</strong></p>
            <p>短链接: https://tinyurl.com/typhoon-wind-profile</p>
            <p>原始链接: <span id="originalUrl"></span></p>
        </div>
    </div>

    <script>
        // 获取当前系统URL
        const currentUrl = window.location.href;
        const systemUrl = currentUrl.replace('qr-redirect.html', 'index.html');
        
        // 显示原始URL
        document.getElementById('originalUrl').textContent = systemUrl;
        
        // 生成二维码
        QRCode.toCanvas(document.getElementById('qrCanvas'), systemUrl, {
            width: 200,
            height: 200,
            margin: 1,
            color: {
                dark: '#1a237e',
                light: '#ffffff'
            }
        });
        
        // 访问次数统计 - 与主系统保持一致
        function getVisitCount() {
            const count = localStorage.getItem('typhoon_wind_profile_visits') || '0';
            document.getElementById('countDisplay').textContent = count;
            return parseInt(count);
        }
        
        function recordVisit() {
            // 设置特殊标记，表明是从二维码跳转过来的
            localStorage.setItem('typhoon_wind_profile_qr_visit', 'true');
            // 记录二维码访问时间
            localStorage.setItem('typhoon_wind_profile_qr_time', Date.now().toString());
        }
        
        // 页面加载时显示当前访问次数
        window.addEventListener('load', function() {
            getVisitCount();
            
            // 检查URL参数，如果是二维码扫描访问，自动跳转
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('qr') === '1') {
                startAutoRedirect();
            }
        });
        
        // 自动跳转功能
        function startAutoRedirect() {
            let countdown = 3;
            const countdownElement = document.getElementById('countdown');
            
            const timer = setInterval(function() {
                countdown--;
                countdownElement.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    recordVisit();
                    // 传递参数，告诉主系统是从二维码跳转过来的
                    window.location.href = 'index.html?qr=1';
                }
            }, 1000);
        }
        
        // 如果是从二维码直接访问，添加参数并自动跳转
        if (document.referrer === '' && !window.location.search.includes('qr')) {
            // 很可能是直接扫描二维码访问
            window.history.replaceState({}, '', window.location.pathname + '?qr=1');
            startAutoRedirect();
        }
    </script>
</body>
</html>
